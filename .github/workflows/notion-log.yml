name: Notion Commit Log

on:
  push:
    branches:
      - "**" # 全ブランチ対象（特定ブランチだけにしたければ例: [main, develop]）

jobs:
  log-to-notion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send commit info to Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          curl -s -X POST https://api.notion.com/v1/pages \
            -H "Authorization: Bearer $NOTION_API_KEY" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            -d '{
              "parent": { "database_id": "'"$NOTION_DATABASE_ID"'" },
              "properties": {
                "コミットメッセージ": {
                  "title": [{ "text": { "content": "'"${{ github.event.head_commit.message }}"'" } }]
                },
                "Branch": {
                  "rich_text": [{ "text": { "content": "'"${{ github.ref_name }}"'" } }]
                },
                "Committed At": {
                  "date": { "start": "'"${{ github.event.head_commit.timestamp }}"'" }
                },
                "URL": {
                  "url": "'"${{ github.event.head_commit.url }}"'"
                }
              }
            }'
