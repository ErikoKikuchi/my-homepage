name: Notion Commit Log

on:
  push:
    branches:
      - "**" # 全ブランチ対象（特定ブランチだけにしたければ例: [main, develop]）

jobs:
  log-to-notion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send commit info to Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          COMMITS_JSON: ${{ toJson(github.event.commits) }}
          BRANCH: ${{ github.ref_name }}
        run: |
          echo "$COMMITS_JSON" | jq -c '.[]' | while read commit; do
            PAYLOAD=$(jq -n \
              --arg db "$NOTION_DATABASE_ID" \
              --arg msg "$(echo "$commit" | jq -r '.message')" \
              --arg branch "$BRANCH" \
              --arg ts "$(echo "$commit" | jq -r '.timestamp')" \
              --arg url "$(echo "$commit" | jq -r '.url')" \
              '{
                parent: { database_id: $db },
                properties: {
                  "コミットメッセージ": { title: [{ text: { content: $msg } }] },
                  "Branch": { rich_text: [{ text: { content: $branch } }] },
                  "Committed At": { date: { start: $ts } },
                  "URL": { url: $url }
                }
              }')

            curl -s -X POST https://api.notion.com/v1/pages \
              -H "Authorization: Bearer $NOTION_API_KEY" \
              -H "Content-Type: application/json" \
              -H "Notion-Version: 2022-06-28" \
              -d "$PAYLOAD"
          done
