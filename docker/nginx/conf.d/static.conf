server {
    listen 80;
    server_name localhost;

    root /var/www/static/dist;           # TypeScriptのビルド先
    index index.html;

    location / {
        try_files $uri $uri/ /index.html; # SPAの場合はフォールバック
    }

    location ~* \.(js|css|png|jpg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}